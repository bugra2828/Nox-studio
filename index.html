<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Nox Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
/* ─── RESET & BASE ─── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Inter',sans-serif;background:#000;color:#fff;min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased}

/* ─── LAYOUT ─── */
#shell{display:flex;flex-direction:column;min-height:100vh;position:relative;z-index:1}
.content{flex:1;padding:40px 28px;max-width:700px;width:100%;margin:0 auto}

/* ─── TOPBAR ─── */
.topbar{display:flex;align-items:center;gap:16px;padding:0 24px;height:60px;border-bottom:1px solid rgba(255,255,255,.08);background:rgba(0,0,0,.88);backdrop-filter:blur(24px);position:sticky;top:0;z-index:20}
.hbg{display:flex;align-items:center;justify-content:center;width:40px;height:40px;padding:0;flex-shrink:0;background:rgba(255,255,255,.08);border:1.5px solid rgba(255,255,255,.40);border-radius:8px;cursor:pointer;transition:border-color .2s,background .2s}
.hbg:hover{border-color:#fff;background:rgba(255,255,255,.16)}
.hbg svg{display:block;width:20px;height:20px}
.hbg svg line{stroke:#fff;stroke-width:2.2;stroke-linecap:round}
.topbar-logo{font-size:15px;font-weight:800;color:#fff;letter-spacing:.5px;white-space:nowrap;flex:1}
.topbar-logo .dot{color:rgba(255,255,255,.35);font-weight:400;margin:0 1px}
.topbar-badge{font-size:9px;color:rgba(255,255,255,.28);letter-spacing:2.5px;text-transform:uppercase;white-space:nowrap}

/* ─── OVERLAY ─── */
#overlay{position:fixed;inset:0;background:rgba(0,0,0,.80);z-index:30;opacity:0;pointer-events:none;transition:opacity .26s}
#overlay.on{opacity:1;pointer-events:all}

/* ─── SIDEBAR ─── */
#sidebar{position:fixed;top:0;left:0;bottom:0;width:272px;background:#0b0b0b;border-right:1px solid rgba(255,255,255,.10);z-index:31;transform:translateX(-100%);transition:transform .32s cubic-bezier(.22,1,.36,1);display:flex;flex-direction:column}
#sidebar.on{transform:translateX(0)}
.sb-head{display:flex;align-items:center;justify-content:space-between;padding:0 20px;height:60px;border-bottom:1px solid rgba(255,255,255,.08)}
.sb-logo{font-size:14px;font-weight:800;color:#fff;letter-spacing:.5px}
.sb-logo .dot{color:rgba(255,255,255,.35);font-weight:400}
.sb-close{display:flex;align-items:center;justify-content:center;width:32px;height:32px;background:none;border:1px solid rgba(255,255,255,.15);border-radius:6px;color:#fff;font-size:16px;cursor:pointer;transition:background .15s,border-color .15s}
.sb-close:hover{background:rgba(255,255,255,.10);border-color:rgba(255,255,255,.4)}
.sb-nav{flex:1;padding:12px 0;overflow-y:auto}
.sb-label{font-size:9px;font-weight:600;color:rgba(255,255,255,.35);letter-spacing:2.5px;text-transform:uppercase;padding:14px 20px 5px;display:block}
.sb-link{display:flex;align-items:center;gap:11px;width:100%;padding:10px 20px;background:none;border:none;color:#fff;font-family:'Inter',sans-serif;font-size:13px;font-weight:500;cursor:pointer;text-align:left;transition:background .14s;border-left:2px solid transparent}
.sb-link:hover{background:rgba(255,255,255,.07);border-left-color:rgba(255,255,255,.3)}
.sb-link.active{background:rgba(255,255,255,.10);border-left-color:#fff;font-weight:700}
.sb-icon{display:flex;align-items:center;justify-content:center;width:20px;height:20px;flex-shrink:0}
.sb-icon svg{width:16px;height:16px;stroke:#fff;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.sb-badge{font-size:8px;font-weight:600;letter-spacing:1.2px;text-transform:uppercase;padding:2px 7px;border:1px solid rgba(255,255,255,.25);color:#fff;margin-left:auto;flex-shrink:0;border-radius:3px;background:rgba(255,255,255,.06)}
.sb-foot{padding:14px 20px;border-top:1px solid rgba(255,255,255,.07);font-size:10px;color:rgba(255,255,255,.25);letter-spacing:.5px}

/* ─── TYPOGRAPHY ─── */
.page-tag{font-size:9px;color:rgba(255,255,255,.35);letter-spacing:3px;text-transform:uppercase;margin-bottom:10px}
.page-title{font-size:30px;font-weight:700;letter-spacing:-.6px;margin-bottom:8px;line-height:1.12;color:#fff}
.page-desc{font-size:13px;color:rgba(255,255,255,.38);margin-bottom:32px;line-height:1.75}

/* ─── CARDS ─── */
.card{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);padding:22px;margin-bottom:16px}
.card-label{font-size:9px;color:rgba(255,255,255,.3);letter-spacing:2px;text-transform:uppercase;margin-bottom:12px;display:block}

/* ─── INPUTS ─── */
.inp{width:100%;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.10);color:#fff;font-family:inherit;font-size:13px;padding:11px 14px;outline:none;transition:border-color .2s}
.inp:focus{border-color:rgba(255,255,255,.4)}
.inp::placeholder{color:rgba(255,255,255,.2)}
.ta{width:100%;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.10);color:#fff;font-family:inherit;font-size:13px;padding:11px 14px;outline:none;min-height:120px;resize:vertical;line-height:1.65;transition:border-color .2s}
.ta:focus{border-color:rgba(255,255,255,.4)}
.ta::placeholder{color:rgba(255,255,255,.2)}

/* ─── UIVERSE BUTTON ─── */
.ui-btn{font-size:14px;border-radius:12px;background:linear-gradient(180deg,rgb(56,56,56) 0%,rgb(36,36,36) 66%,rgb(41,41,41) 100%);color:rgb(218,218,218);border:none;padding:2px;font-weight:700;cursor:pointer;position:relative;overflow:hidden;font-family:inherit;letter-spacing:.2px;transition:transform .18s;display:inline-block}
.ui-btn:hover{transform:translateY(-1px)}.ui-btn:active{transform:translateY(0)}
.ui-btn-inner{border-radius:10px;padding:.72em 1.3em;padding-right:1.15em;text-shadow:0 0 20px #4b4b4b;display:flex;align-items:center;gap:10px;color:inherit;transition:background-color .3s;background-color:rgb(29,29,29);background-image:radial-gradient(at 95% 89%,rgb(15,15,15) 0px,transparent 50%),radial-gradient(at 0% 100%,rgb(17,17,17) 0px,transparent 50%),radial-gradient(at 0% 0%,rgb(29,29,29) 0px,transparent 50%);white-space:nowrap}
.ui-btn:hover .ui-btn-inner{background-color:rgb(26,25,25)}
.ui-btn-inner svg{width:15px;height:15px;flex-shrink:0}
.ui-btn-overlay{position:absolute;inset:0;pointer-events:none;background:repeating-conic-gradient(rgb(48,47,47) 0.0000001%,rgb(51,51,51) 0.000104%) 60% 60%/600% 600%;filter:opacity(10%) contrast(105%);border-radius:12px}
.ui-btn.white-btn{background:linear-gradient(180deg,rgb(255,255,255) 0%,rgb(220,220,220) 66%,rgb(235,235,235) 100%)}
.ui-btn.white-btn .ui-btn-inner{background-color:rgb(245,245,245);background-image:radial-gradient(at 95% 89%,rgb(200,200,200) 0px,transparent 50%),radial-gradient(at 0% 100%,rgb(210,210,210) 0px,transparent 50%),radial-gradient(at 0% 0%,rgb(245,245,245) 0px,transparent 50%);color:#000;text-shadow:none}
.ui-btn.ghost-btn{background:linear-gradient(180deg,rgb(30,30,30) 0%,rgb(18,18,18) 66%,rgb(22,22,22) 100%)}
.ui-btn.ghost-btn .ui-btn-inner{background-color:rgb(14,14,14);background-image:radial-gradient(at 95% 89%,rgb(8,8,8) 0px,transparent 50%),radial-gradient(at 0% 100%,rgb(10,10,10) 0px,transparent 50%),radial-gradient(at 0% 0%,rgb(14,14,14) 0px,transparent 50%);color:rgba(255,255,255,.35)}
.btn-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px;align-items:center}

/* ─── LOADING BAR ─── */
.load-bar{height:1px;background:linear-gradient(90deg,rgba(255,255,255,0) 0%,rgba(255,255,255,.9) 40%,rgba(255,255,255,.9) 60%,rgba(255,255,255,0) 100%);background-size:200%;margin-top:16px;animation:shimmer 1.6s linear infinite}
@keyframes shimmer{0%{background-position:200%}100%{background-position:-200%}}

/* ─── BACK BUTTON ─── */
.back{background:none;border:none;color:rgba(255,255,255,.28);font-family:inherit;font-size:10px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;padding:0;margin-bottom:40px;display:inline-flex;align-items:center;gap:7px;transition:color .2s}
.back:hover{color:rgba(255,255,255,.8)}

/* ─── HERO ─── */
.hero-wrap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:80px 28px 100px;max-width:860px;width:100%;margin:0 auto}
.hero-eyebrow{display:inline-flex;align-items:center;gap:14px;font-size:9px;color:rgba(255,255,255,.35);letter-spacing:4px;text-transform:uppercase;margin-bottom:36px}
.hero-eyebrow::before,.hero-eyebrow::after{content:'';display:block;width:32px;height:1px;background:rgba(255,255,255,.2)}
.hero-line{width:1px;height:56px;background:linear-gradient(180deg,rgba(255,255,255,0),rgba(255,255,255,.22),rgba(255,255,255,0));margin:0 auto 36px}
.hero-title{font-size:clamp(36px,6.5vw,76px);font-weight:900;letter-spacing:-3.5px;line-height:.95;color:#fff;margin-bottom:32px;max-width:820px}
.hero-title .dim{display:block;font-size:.38em;font-weight:300;color:rgba(255,255,255,.28);margin-top:22px;line-height:1.6;letter-spacing:0}
.hero-desc{font-size:15px;color:rgba(255,255,255,.38);line-height:1.8;max-width:520px;margin:0 auto 52px}
.hero-cta{display:flex;align-items:center;gap:18px;flex-wrap:wrap;justify-content:center}
.hero-hint{font-size:10px;color:rgba(255,255,255,.22);letter-spacing:1.5px;text-transform:uppercase}

/* ─── DASHBOARD ─── */
.dash-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:1px;background:rgba(255,255,255,.06)}
.d-card{background:#000;padding:28px 22px;cursor:default;position:relative;overflow:hidden}
.d-card::after{content:'';position:absolute;bottom:0;left:0;right:0;height:1px;background:rgba(255,255,255,.18)}
.d-card::before{content:attr(data-num);position:absolute;bottom:16px;right:16px;font-size:52px;font-weight:900;color:rgba(255,255,255,.03);letter-spacing:-3px;line-height:1;pointer-events:none}
.d-icon{font-size:20px;margin-bottom:16px;opacity:.5}
.d-num{font-size:9px;color:rgba(255,255,255,.2);letter-spacing:2px;text-transform:uppercase;margin-bottom:10px}
.d-name{font-size:15px;font-weight:600;margin-bottom:6px;color:#fff}
.d-desc{font-size:11px;color:rgba(255,255,255,.35);line-height:1.65}

/* ─── CUSTOM DROPDOWNS ─── */
.hook-row{display:flex;gap:12px;margin-bottom:14px;flex-wrap:wrap;align-items:flex-end}
.hook-group{display:flex;flex-direction:column;gap:6px;flex:1;min-width:180px}
.hook-group .card-label{margin-bottom:0}
.dd-wrap{position:relative;width:100%;user-select:none;-webkit-user-select:none}
.dd-trigger{display:flex;align-items:center;justify-content:space-between;width:100%;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.10);color:#fff;font-family:'Inter',sans-serif;font-size:13px;font-weight:500;padding:11px 14px;cursor:pointer;transition:border-color .18s;outline:none}
.dd-trigger:hover,.dd-trigger.open{border-color:rgba(255,255,255,.4)}
.dd-chevron{width:14px;height:14px;flex-shrink:0;margin-left:10px;stroke:rgba(255,255,255,.5);fill:none;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round;transition:transform .18s}
.dd-trigger.open .dd-chevron{transform:rotate(180deg)}
.dd-menu{position:absolute;top:calc(100% + 4px);left:0;right:0;z-index:200;background:#111;border:1px solid rgba(255,255,255,.15);overflow:hidden;animation:ddFadeIn .14s ease both}
@keyframes ddFadeIn{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
.dd-option{padding:11px 14px;font-family:'Inter',sans-serif;font-size:13px;font-weight:400;color:rgba(255,255,255,.7);cursor:pointer;border-left:2px solid transparent;transition:background .12s,color .12s}
.dd-option:hover{background:rgba(255,255,255,.07);color:#fff;border-left-color:rgba(255,255,255,.3)}
.dd-option.selected{color:#fff;font-weight:600;border-left-color:#fff;background:rgba(255,255,255,.05)}

/* ─── SUMMARY CARDS ─── */
.summary-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:16px;margin-bottom:4px}
@media(max-width:480px){.summary-grid{grid-template-columns:1fr}}
.summary-card{display:flex;flex-direction:column;gap:10px;padding:18px 20px;border:1px solid rgba(255,255,255,.10);background:rgba(255,255,255,.02)}
.summary-card-header{display:flex;align-items:center;gap:9px}
.summary-card-icon{display:flex;align-items:center;justify-content:center;width:28px;height:28px;flex-shrink:0;border:1px solid rgba(255,255,255,.12);background:rgba(255,255,255,.04)}
.summary-card-icon svg{width:14px;height:14px;stroke:rgba(255,255,255,.7);fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.summary-card-title{font-size:9px;font-weight:600;color:rgba(255,255,255,.35);letter-spacing:2px;text-transform:uppercase}
.summary-card-value{font-size:15px;font-weight:700;color:#fff;letter-spacing:-.2px;line-height:1.3;white-space:normal;word-break:break-word}

/* ─── SCRIPT OUTPUT ─── */
.script-box{background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.08);padding:16px 18px;font-size:13px;line-height:1.9;margin-top:14px;color:rgba(255,255,255,.75)}
.script-line{margin-bottom:5px;line-height:1.75}
.script-tag{color:#fff;font-weight:700;opacity:.55;margin-right:6px}
.script-bullet{display:flex;gap:8px;margin-bottom:5px;padding-left:4px;line-height:1.7}
.script-spacer{height:8px}

/* ─── VOICEOVER ─── */
.voice-settings-row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:16px}
@media(max-width:520px){.voice-settings-row{grid-template-columns:1fr}}
.import-btn{display:inline-flex;align-items:center;gap:8px;background:none;border:1px solid rgba(255,255,255,.12);color:rgba(255,255,255,.65);font-family:'Inter',sans-serif;font-size:11px;font-weight:500;letter-spacing:.5px;padding:8px 14px;cursor:pointer;margin-bottom:10px;transition:border-color .18s,color .18s,background .18s}
.import-btn:hover{border-color:rgba(255,255,255,.4);color:#fff;background:rgba(255,255,255,.04)}
.vo-player{display:flex;align-items:center;gap:16px;padding:16px 18px;margin-top:16px;border:1px solid rgba(255,255,255,.10);background:rgba(255,255,255,.02)}
.vo-play-btn{width:42px;height:42px;flex-shrink:0;background:#fff;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .18s,opacity .2s}
.vo-play-btn:hover{transform:scale(1.07);opacity:.88}
.vo-play-btn svg{width:16px;height:16px;fill:#000;stroke:none}
.vo-waveform{flex:1;display:flex;align-items:center;gap:3px;height:36px;overflow:hidden}
.vo-bar{flex:1;background:rgba(255,255,255,.18);border-radius:1px;transition:background .2s;min-width:2px}
.vo-bar.active{background:#fff}
.vo-meta{display:flex;flex-direction:column;align-items:flex-end;gap:3px;flex-shrink:0}
.vo-time{font-size:11px;color:#fff;font-weight:600;letter-spacing:.3px}
.vo-filename{font-size:9px;color:rgba(255,255,255,.3);letter-spacing:1px}

/* ─── LINK TO VIDEO ─── */
.summary-list{background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.08);padding:16px 18px;margin-top:14px}
.sum-row{display:flex;gap:12px;margin-bottom:10px;font-size:12px;align-items:flex-start}
.sum-row:last-child{margin-bottom:0}
.sum-key{color:rgba(255,255,255,.3);min-width:76px;flex-shrink:0}
.sum-val{color:rgba(255,255,255,.75);line-height:1.55}

/* ─── CAPTIONS ─── */
.upload{border:1px dashed rgba(255,255,255,.15);padding:38px 20px;text-align:center;cursor:pointer;transition:border-color .2s,background .2s;margin-bottom:14px}
.upload:hover{border-color:rgba(255,255,255,.4);background:rgba(255,255,255,.02)}
.upload-icon{font-size:26px;margin-bottom:10px;display:block;opacity:.5}
.upload-txt{font-size:11px;color:rgba(255,255,255,.3)}
.video-mock{aspect-ratio:16/9;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);display:flex;align-items:center;justify-content:center;margin-top:14px;position:relative;overflow:hidden}
.v-play{font-size:32px;opacity:.15}
.v-cap{position:absolute;bottom:0;left:0;right:0;padding:10px 14px;background:linear-gradient(transparent,rgba(0,0,0,.88));display:flex;align-items:center}
.cap-pill{background:#fff;color:#000;font-size:11px;padding:3px 10px;font-weight:700;letter-spacing:.2px}

/* ─── COMING SOON ─── */
.cs-wrap{text-align:center;padding:100px 24px}
.cs-icon{font-size:56px;margin-bottom:24px;display:block;opacity:.18;animation:blink 3s ease-in-out infinite}
.cs-title{font-size:48px;font-weight:800;letter-spacing:-2.5px;margin-bottom:12px;color:#fff}
.cs-desc{font-size:11px;color:rgba(255,255,255,.25);letter-spacing:2px;text-transform:uppercase}
@keyframes blink{0%,100%{opacity:.12}50%{opacity:.35}}

/* ─── REPLICATE API PANEL ─── */
.api-panel{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);padding:18px 22px;margin-bottom:16px}
.api-status{display:inline-flex;align-items:center;gap:6px;font-size:10px;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:12px}
.api-dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.25)}
.api-dot.live{background:#4ade80}
.api-output{background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.08);padding:14px 16px;margin-top:12px;font-size:12px;color:rgba(255,255,255,.7);line-height:1.7;white-space:pre-wrap;min-height:80px}

/* ─── SCROLLBAR ─── */
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15)}

/* ─── MOBILE ─── */
@media(max-width:520px){.hero-wrap{padding:60px 20px 80px}.hero-title{letter-spacing:-2px}.content{padding:28px 16px}}

/* ─── NOISE CANVAS ─── */
#noise-canvas{position:fixed;inset:0;width:100%;height:100%;z-index:0;pointer-events:none;display:block}
</style>

</head>
<body>

<canvas id="noise-canvas"></canvas>

<div id="overlay"></div>

<div id="sidebar">
  <div class="sb-head">
    <span class="sb-logo">Nox<span class="dot"> · </span>Studio</span>
    <button class="sb-close" onclick="closeSidebar()">✕</button>
  </div>
  <div class="sb-nav">
    <span class="sb-label">Tools</span>
    <button class="sb-link" data-view="script" onclick="navigate('script')">
      <span class="sb-icon"><svg viewBox="0 0 24 24"><path d="M12 2l2 7h7l-5.5 4 2 7L12 16l-5.5 4 2-7L3 9h7z"/></svg></span>
      AI Script Generator<span class="sb-badge">Live</span>
    </button>
    <button class="sb-link" data-view="voice" onclick="navigate('voice')">
      <span class="sb-icon"><svg viewBox="0 0 24 24"><rect x="9" y="2" width="6" height="11" rx="3"/><path d="M5 10a7 7 0 0 0 14 0"/><line x1="12" y1="19" x2="12" y2="22"/><line x1="9" y1="22" x2="15" y2="22"/></svg></span>
      AI Voiceover<span class="sb-badge">Live</span>
    </button>
    <button class="sb-link" data-view="link" onclick="navigate('link')">
      <span class="sb-icon"><svg viewBox="0 0 24 24"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg></span>
      Link to Video<span class="sb-badge">New</span>
    </button>
    <button class="sb-link" data-view="caps" onclick="navigate('caps')">
      <span class="sb-icon"><svg viewBox="0 0 24 24"><rect x="2" y="5" width="20" height="14" rx="2"/><path d="M7 10h10M7 14h6"/></svg></span>
      Auto Captions<span class="sb-badge">Live</span>
    </button>
    <button class="sb-link" data-view="video" onclick="navigate('video')">
      <span class="sb-icon"><svg viewBox="0 0 24 24"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg></span>
      Viral Video Creator<span class="sb-badge">Soon</span>
    </button>
    <span class="sb-label" style="margin-top:8px">Navigate</span>
    <button class="sb-link" data-view="home" onclick="navigate('home')">
      <span class="sb-icon"><svg viewBox="0 0 24 24"><path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9.5z"/><path d="M9 21V12h6v9"/></svg></span>
      Home

/* ── NOISE BACKGROUND ── */
(function() {
  const canvas = document.getElementById('noise-canvas');
  const ctx = canvas.getContext('2d');
  const TILE = 220;
  const off = document.createElement('canvas');
  off.width = off.height = TILE;
  const octx = off.getContext('2d');
  function buildTile() {
    const id = octx.createImageData(TILE, TILE), d = id.data;
    for (let i = 0; i < d.length; i += 4) {
      const v = Math.random() * 255 | 0;
      d[i] = d[i+1] = d[i+2] = v;
      d[i+3] = Math.random() * 18 | 0;
    }
    octx.putImageData(id, 0, 0);
  }
  function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
  let frame = 0;
  function draw() {
    const W = canvas.width, H = canvas.height;
    ctx.fillStyle = '#000'; ctx.fillRect(0,0,W,H);
    const lift = ctx.createRadialGradient(W*.5,H*.38,0,W*.5,H*.38,W*.7);
    lift.addColorStop(0,'rgba(255,255,255,0.028)'); lift.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle = lift; ctx.fillRect(0,0,W,H);
    if (frame % 3 === 0) buildTile();
    for (let x=0;x<W;x+=TILE) for (let y=0;y<H;y+=TILE) ctx.drawImage(off,x,y);
    const vign = ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,Math.max(W,H)*.72);
    vign.addColorStop(0,'rgba(0,0,0,0)'); vign.addColorStop(1,'rgba(0,0,0,0.72)');
    ctx.fillStyle = vign; ctx.fillRect(0,0,W,H);
    frame++; requestAnimationFrame(draw);
  }
  resize(); buildTile(); draw();
  window.addEventListener('resize', resize);
})();

function strip(t) { return t.replace(/\[HOOK\]\s*/g,'').replace(/\[BODY\]\s*/g,'').replace(/\[CTA\]\s*/g,'').trim(); }

function renderScript(raw) {
  const lines = raw.split('\n');
  return lines.map(line => {
    const tr = line.trim();
    if (/^\[(HOOK|BODY|CTA)\]/.test(tr)) {
      const tag = tr.match(/^(\[[A-Z]+\])/)[1];
      const rest = tr.slice(tag.length).trim();
      return `<div class="script-line"><span class="script-tag">${tag}</span>${renderInline(rest)}</div>`;
    }
    if (tr === '') return '<div class="script-spacer"></div>';
    if (tr.startsWith('- ') || tr.startsWith('* ')) {
      return `<div class="script-bullet"><span style="color:rgba(255,255,255,.35);flex-shrink:0">—</span><span>${renderInline(tr.slice(2))}</span></div>`;
    }
    return `<div class="script-line">${renderInline(tr)}</div>`;
  }).join('');
}

function renderInline(text) {
  return text.replace(/\*\*(.*?)\*\*/g, '<strong style="color:#fff;font-weight:700">$1</strong>');

/* ── LIVE REPLICATE API CONNECTION ── */
async function generateScript() {
  const topic = document.getElementById('script-topic').value.trim();
  if (!topic) return;

  const loading = document.getElementById('script-loading');
  const output  = document.getElementById('script-output');
  const btn     = document.getElementById('btn-gen-script');
  const scriptBox = document.getElementById('script-box');

  loading.style.display = 'block';
  output.style.display  = 'none';
  btn.style.opacity     = '.6';
  btn.style.pointerEvents = 'none';
  btn.querySelector('.ui-btn-inner').lastChild.textContent = ' Generating...';

  // LLAMA-3 PROMPT TEMPLATE SETUP
  const systemPrompt = "You are a viral content expert. Write dark, engaging, and scroll-stopping scripts for TikTok and Reels. Structure the script EXACTLY with these tags: [HOOK], [BODY], and [CTA]. Keep it concise and highly impactful.";
  const userPrompt = `Write a ${ddState.dur} script with a "${ddState.hook}" hook style about: ${topic}`;
  const llamaPrompt = `<|begin_of_text|><|start_header_id|>system<|end_header_id|>\n\n${systemPrompt}<|eot_id|><|start_header_id|>user<|end_header_id|>\n\n${userPrompt}<|eot_id|><|start_header_id|>assistant<|end_header_id|>\n\n`;

  try {
    const resp = await fetch('/api/replicate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        version: "36503077aa6533169719336d3c011e40040bc43c1622b7d5982e99214cd7008e",
        input: {
          prompt: llamaPrompt,
          max_new_tokens: 512,
          temperature: 0.7,
          prompt_template: "{prompt}" 
        }
      })
    });

    const data = await resp.json();
    let finalScript = "";

    if (Array.isArray(data.output)) {
      finalScript = data.output.join('');
    } else if (data.output) {
      finalScript = data.output;
    } else {
      finalScript = "Bağlantı başarılı fakat modelden yanıt alınamadı. Vercel loglarını kontrol edin.";
    }

    scriptText = finalScript;
    scriptBox.innerHTML = renderScript(scriptText);
  } catch (error) {
    scriptBox.innerHTML = "Hata: API bağlantısı kurulamadı. Lütfen 'api/replicate.js' dosyasını ve API anahtarınızı kontrol edin.";
    console.error(error);
  }

  loading.style.display = 'none';
  output.style.display  = 'block';
  btn.style.opacity     = '1';
  btn.style.pointerEvents = 'auto';
  btn.querySelector('.ui-btn-inner').lastChild.textContent = ' Generate Script';
}

function resetLink() {
  document.getElementById('link-url').value='';
  document.getElementById('link-output').style.display='none';
}

/* CAPTIONS */
let capsUploaded = false;

function renderCaps() {
  return `<div class="content">
    <button class="back" onclick="navigate('dash')">← Back to Dashboard</button>
    <div class="page-tag">Tool 04</div>
    <h2 class="page-title">Auto Captions</h2>
    <p class="page-desc">Upload a video and get burned-in captions in seconds.</p>
    <div class="card">
      <div class="upload" id="caps-upload" onclick="toggleUpload()">
        <span class="upload-icon" id="upload-icon">⬆</span>
        <div class="upload-txt" id="upload-txt">Click to upload your video file</div>
      </div>
      ${mkBtn('Generate Captions','<rect x="2" y="5" width="20" height="14" rx="2"/><path d="M7 10h10M7 14h6"/>','','btn-gen-caps')}
    </div>
    <div id="caps-loading" style="display:none"><div class="load-bar"></div></div>
    <div id="caps-output" style="display:none">
      <div class="card">
        <span class="card-label">Preview</span>
        <div class="video-mock">
          <span class="v-play">▶</span>
          <div class="v-cap"><span class="cap-pill">...and THAT is the secret formula.</span></div>
        </div>
      </div>
    </div>
  </div>`;
}

function toggleUpload() {
  capsUploaded = !capsUploaded;
  const icon = document.getElementById('upload-icon');
  const txt  = document.getElementById('upload-txt');
  if (icon) icon.textContent = capsUploaded ? '✓' : '⬆';
  if (txt)  txt.textContent  = capsUploaded ? 'video_clip.mp4 · ready to process' : 'Click to upload your video file';
}

function generateCaps() {
  document.getElementById('caps-loading').style.display='block';
  document.getElementById('caps-output').style.display='none';
  setTimeout(() => {
    document.getElementById('caps-loading').style.display='none';
    document.getElementById('caps-output').style.display='block';
  }, 1500);
}

/* VIDEO */
function renderVideo() {
  return `<div class="content">
    <button class="back" onclick="navigate('dash')">← Back to Dashboard</button>
    <div class="cs-wrap">
      <span class="cs-icon">⬡</span>
      <h2 class="cs-title">Coming <span>Soon</span></h2>
      <p class="cs-desc">Viral Video Creator · In development</p>
    </div>
  </div>`;
}

/* ── RENDER ENGINE ── */
function render() {
  const root = document.getElementById('view-root');
  const views = { home: renderHome, dash: renderDash, script: renderScript, voice: renderVoice, link: renderLink, caps: renderCaps, video: renderVideo };
  root.innerHTML = (views[currentView] || renderHome)();
  bindEvents();
}

function bindEvents() {
  const btnEnter = document.getElementById('btn-enter');
  if (btnEnter) btnEnter.addEventListener('click', () => navigate('dash'));

  const btnGenScript = document.getElementById('btn-gen-script');
  if (btnGenScript) btnGenScript.addEventListener('click', generateScript);
  const btnSendVoice = document.getElementById('btn-send-voice');
  if (btnSendVoice) btnSendVoice.addEventListener('click', sendToVoice);
  const btnResetScript = document.getElementById('btn-reset-script');
  if (btnResetScript) btnResetScript.addEventListener('click', resetScript);

  const btnGenVoice = document.getElementById('btn-gen-voice');
  if (btnGenVoice) btnGenVoice.addEventListener('click', generateVoice);

  const btnProcessLink = document.getElementById('btn-process-link');
  if (btnProcessLink) btnProcessLink.addEventListener('click', processLink);
  const btnCreateVersion = document.getElementById('btn-create-version');
  if (btnCreateVersion) btnCreateVersion.addEventListener('click', createVersion);
  const btnResetLink = document.getElementById('btn-reset-link');
  if (btnResetLink) btnResetLink.addEventListener('click', resetLink);

  const btnGenCaps = document.getElementById('btn-gen-caps');
  if (btnGenCaps) btnGenCaps.addEventListener('click', generateCaps);

  const content = document.querySelector('.content');
  if (content) content.addEventListener('click', function(e) {
    if (!e.target.closest('.dd-wrap')) {
      document.querySelectorAll('.dd-menu').forEach(m => {
        m.style.display='none';
        if (m.previousElementSibling) m.previousElementSibling.classList.remove('open');
      });
    }
  });
}

/* ── BOOT ── */
navigate('home');
</script>

</body>
</html>
